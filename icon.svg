<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .plant-color { fill: #2d5016; }
      .accent-color { fill: #6ba644; }
      .branch { stroke: #2d5016; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Tree trunk -->
  <rect x="45" y="60" width="10" height="30" class="plant-color"/>

  <!-- Main branches -->
  <line x1="50" y1="60" x2="30" y2="40" class="branch"/>
  <line x1="50" y1="60" x2="70" y2="40" class="branch"/>
  <line x1="50" y1="50" x2="25" y2="25" class="branch"/>
  <line x1="50" y1="50" x2="75" y2="25" class="branch"/>

  <!-- Leaves/foliage -->
  <circle cx="25" cy="25" r="8" class="accent-color"/>
  <circle cx="30" cy="40" r="8" class="accent-color"/>
  <circle cx="70" cy="40" r="8" class="accent-color"/>
  <circle cx="75" cy="25" r="8" class="accent-color"/>
  <circle cx="50" cy="15" r="7" class="accent-color"/>

  <!-- Additional decorative elements -->
  <circle cx="45" cy="35" r="6" class="plant-color" opacity="0.6"/>
  <circle cx="55" cy="35" r="6" class="plant-color" opacity="0.6"/>
</svg>